  web:
    build: .
      # image: ghcr.io/mastodon/mastodon:v4.2.3
    restart: always
    env_file: .env.production
    command: bash -c "rm -f /mastodon/tmp/pids/server.pid;bundle exec rails db:migrate; bundle exec rails s -p 3000"
    networks:
      - external_network
      - internal_network
    healthcheck:
      # prettier-ignore
      test: ['CMD-SHELL', 'wget -q --spider --proxy=off localhost:3000/health || exit 1']
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis
      # - es
    volumes:
      - ./public/system:/mastodon/public/system

    deploy:
      resources:
        limits:
          memory: 4096M
    logging:
      options:
        max-size: 50m

  streaming:
    build:
      context: .
      dockerfile: ./streaming/Dockerfile
      #image: ghcr.io/mastodon/mastodon:v4.2.3
    restart: always
    env_file: .env.production
    command: node ./streaming/index.js
    networks:
      - external_network
      - internal_network
    healthcheck:
      # prettier-ignore
      test: ['CMD-SHELL', 'wget -q --spider --proxy=off localhost:4000/api/v1/streaming/health || exit 1']
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
    logging:
      options:
        max-size: 50m

  sidekiq-1:
    build: .
      # image: ghcr.io/mastodon/mastodon:v4.2.3
    restart: always
    env_file: .env.production
    command: bundle exec sidekiq 
